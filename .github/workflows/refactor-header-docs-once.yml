name: Apply header-first layout and organize docs

on:
  push:
    branches:
      - agent/header-scoped-system-machine-docs
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/header-scoped-system-machine-docs
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply deterministic refactor
        run: |
          python3 scripts/refactor_header_docs_once.py
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tests/test_header_first_layout.py")
          text = path.read_text(encoding="utf-8")
          old = """>step(state:MotorState,input:Input):MotorState
  command := decide(input)
  command==Stop >> MotorState(Stopped,Stop)
  command==Drive(speed) >> MotorState(Running,Drive(speed))
  _ >> MotorState(Faulted,Stop)
"""
          new = """>step(state:MotorState,input:Input):MotorState
  command := decide(input)
  next :=
    command==Stop >> MotorState(Stopped,Stop)
    command==Drive(speed) >> MotorState(Running,Drive(speed))
    _ >> MotorState(Faulted,Stop)
  next
"""
          if text.count(old) != 2:
              raise SystemExit("expected two generated step blocks")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

      - name: Run Python tests
        run: |
          if ! python3 -m unittest discover -s tests -q > /tmp/glyph-tests.log 2>&1; then
            cat /tmp/glyph-tests.log
            exit 1
          fi

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refactor-test-log
          path: /tmp/glyph-tests.log
          if-no-files-found: ignore

      - name: Check representative header-first sources
        run: |
          python3 glyphc.py examples/acceptance/motor_safety.glyph --check
          python3 glyphc.py examples/acceptance/door_controller.glyph --check

      - name: Commit generated refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Adopt header-first layout and organize documentation"
          git push origin HEAD:agent/header-scoped-system-machine-docs
