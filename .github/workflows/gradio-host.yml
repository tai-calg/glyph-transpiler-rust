name: Gradio Host

on:
  pull_request:
    branches: [main, feature/gradio-live-host]
    paths:
      - "glyph/pure_runtime.py"
      - "glyph/ui_ir.py"
      - "glyph/gradio_renderer.py"
      - "glyph_gradio.py"
      - "examples/gradio_*.glyph"
      - "examples/gradio_temperature_app.py"
      - "examples/gradio_temperature_dashboard.py"
      - "requirements-gradio.txt"
      - "tests/test_pure_runtime.py"
      - "tests/test_ui_ir.py"
      - "tests/test_gradio_host_example.py"
      - "tests/test_gradio_auto_renderer.py"
      - ".github/workflows/gradio-host.yml"
  push:
    branches: [main]
    paths:
      - "glyph/pure_runtime.py"
      - "glyph/ui_ir.py"
      - "glyph/gradio_renderer.py"
      - "glyph_gradio.py"
      - "examples/gradio_*.glyph"
      - "examples/gradio_temperature_app.py"
      - "examples/gradio_temperature_dashboard.py"
      - "requirements-gradio.txt"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-gradio-host:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-gradio.txt

      - name: Install Gradio Host dependencies
        run: python3 -m pip install -r requirements-gradio.txt

      - name: Run Pure Runtime, UI IR, and Gradio tests
        run: |
          python3 -m unittest discover -s tests -p 'test_pure_runtime.py' -v
          python3 -m unittest discover -s tests -p 'test_ui_ir.py' -v
          python3 -m unittest discover -s tests -p 'test_gradio_host_example.py' -v
          python3 -m unittest discover -s tests -p 'test_gradio_auto_renderer.py' -v

      - name: Build custom and generic Gradio component graphs
        id: gradio_graph
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY' 2>&1 | tee gradio-build.log
          import gradio as gr
          import importlib.util
          import inspect
          from pathlib import Path
          import sys

          custom_path = Path("examples/gradio_temperature_app.py")
          spec = importlib.util.spec_from_file_location("glyph_gradio_example", custom_path)
          if spec is None or spec.loader is None:
              raise RuntimeError("could not load custom Gradio example module")
          custom = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = custom
          spec.loader.exec_module(custom)

          print("gradio", gr.__version__)
          print("LinePlot", inspect.signature(gr.LinePlot))
          print("Timer", inspect.signature(gr.Timer))
          print("Blocks.launch", inspect.signature(gr.Blocks.launch))

          runtime = custom.LivePureGlyphRuntime(Path("examples/gradio_temperature.glyph"))
          try:
              demo = custom.build_demo(runtime)
              if demo is None:
                  raise RuntimeError("custom build_demo returned no Blocks app")
          finally:
              runtime.stop()

          from glyph.gradio_renderer import build_gradio_app
          from glyph.pure_runtime import LivePureGlyphRuntime
          from glyph.ui_ir import build_ui_application

          for source in (
              Path("examples/gradio_temperature.glyph"),
              Path("examples/gradio_profile.glyph"),
              Path("examples/gradio_motor.glyph"),
          ):
              generic_runtime = LivePureGlyphRuntime(source)
              try:
                  snapshot = generic_runtime.compiler.last_snapshot
                  if snapshot is None:
                      raise RuntimeError(f"no snapshot for {source}")
                  app = build_ui_application(snapshot.model, source_name=str(source))
                  generic_demo = build_gradio_app(generic_runtime, app)
                  if generic_demo is None:
                      raise RuntimeError(f"generic renderer returned no app for {source}")
                  print("generic component graph", source, "ok")
              finally:
                  generic_runtime.stop()
          PY

      - name: Upload Gradio build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradio-build-log
          path: gradio-build.log

      - name: Stop after Gradio component build failure
        if: steps.gradio_graph.outcome == 'failure'
        run: exit 1

      - name: Verify command-line entrypoints
        run: |
          python3 examples/gradio_temperature_app.py --help
          python3 glyph_gradio.py examples/gradio_profile.glyph --check \
            --ui-ir-output build/profile-ui-ir.json
          grep -q '"schema": "glyph.ui-ir"' build/profile-ui-ir.json
