name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchains
        run: |
          python3 --version
          rustc --version
          cargo --version

      - name: Run Python compiler tests
        id: python_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 -m unittest discover -s tests -v 2>&1 | tee python-test.log

      - name: Upload Python test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-log
          path: python-test.log

      - name: Stop after Python test failure
        if: steps.python_tests.outcome == 'failure'
        run: exit 1

      - name: Verify deterministic Rust generation
        run: |
          python3 glyphc.py examples/controller.glyph \
            -o demo/src/generated.rs \
            --host-output demo/src/host.generated.rs
          git diff --exit-code -- demo/src/generated.rs demo/src/host.generated.rs

      - name: Upload generated Rust sources
        uses: actions/upload-artifact@v4
        with:
          name: generated-rust-sources
          path: |
            demo/src/generated.rs
            demo/src/host.generated.rs

      - name: Format generated Rust
        run: cargo fmt --manifest-path demo/Cargo.toml

      - name: Run Rust tests
        id: rust_tests
        shell: bash
        run: |
          set +e
          cargo test --manifest-path demo/Cargo.toml --verbose > cargo-test.log 2>&1
          status=$?
          tail -n 120 cargo-test.log
          exit $status

      - name: Upload Cargo test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-log
          path: cargo-test.log

      - name: Run demo
        run: cargo run --manifest-path demo/Cargo.toml --quiet

      - name: Run Clippy
        run: cargo clippy --manifest-path demo/Cargo.toml --all-targets
