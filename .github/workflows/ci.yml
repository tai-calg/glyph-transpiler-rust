name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchains
        run: |
          python3 --version
          rustc --version
          cargo --version

      - name: Run Python compiler tests
        id: python_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 -m unittest discover -s tests -v 2>&1 | tee python-test.log

      - name: Upload Python test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-log
          path: python-test.log

      - name: Stop after Python test failure
        if: steps.python_tests.outcome == 'failure'
        run: exit 1

      - name: Run v0.1 acceptance campaign
        run: |
          python3 glyphc.py examples/acceptance/door_controller.glyph --check
          python3 glyphc.py examples/acceptance/job_scheduler.glyph --check
          python3 glyphc.py examples/acceptance/motor_safety.glyph --check
          python3 -m unittest discover -s tests -p 'test_acceptance_*.py' -v
          for source in examples/acceptance/*.glyph; do
            name="$(basename "$source" .glyph)"
            python3 glyphc.py "$source" \
              -o "build/acceptance/$name/generated.rs" \
              --host-output "build/acceptance/$name/host.generated.rs" \
              --diagram-dir "build/acceptance/$name/diagrams" \
              --ast-json "build/acceptance/$name/typed-ast.json"
          done
          test -s build/acceptance/door_controller/diagrams/machine-door.mmd
          test -s build/acceptance/motor_safety/diagrams/machine-motor.mmd
          grep -q '"schema": "glyph.algorithm-ir"' \
            build/acceptance/job_scheduler/diagrams/algorithm-ir.json
          grep -q 'class algorithm_build_batch' \
            build/acceptance/job_scheduler/diagrams/logic.mmd

      - name: Verify deterministic Rust generation
        run: |
          python3 glyphc.py examples/controller.glyph \
            -o demo/src/generated.rs \
            --host-output demo/src/host.generated.rs
          git diff --exit-code -- demo/src/generated.rs demo/src/host.generated.rs

      - name: Generate complete system demo
        run: |
          python3 glyphc.py examples/system_controller.glyph \
            -o demo-system/src/generated.rs \
            --host-output demo-system/src/host.generated.rs

      - name: Generate execution structure diagrams
        run: |
          python3 glyphc.py examples/system_controller.glyph \
            --diagram-dir build/glyph-diagrams
          test -s build/glyph-diagrams/architecture.mmd
          test -s build/glyph-diagrams/architecture-ir.json
          test -s build/glyph-diagrams/execution.mmd
          test -s build/glyph-diagrams/machine-controller.mmd
          test -s build/glyph-diagrams/temporal.mmd
          test -s build/glyph-diagrams/execution-ir.json
          test -s build/glyph-diagrams/source-map.json
          test -s build/glyph-diagrams/index.md
          grep -q 'stateDiagram-v2' build/glyph-diagrams/machine-controller.mmd
          grep -q 'click fn_step' build/glyph-diagrams/execution.mmd

      - name: Verify function values, AST macros, typed AST, and watch iteration
        run: |
          python3 glyphc.py examples/lisp_core.glyph \
            -o build/lisp-core/generated.rs \
            --diagram-dir build/lisp-core/diagrams \
            --ast-json build/lisp-core/typed-ast.json
          rustc --edition 2021 --crate-type lib build/lisp-core/generated.rs \
            -o build/lisp-core/libglyph_lisp_core.rlib
          python3 glyphc.py examples/lisp_core.glyph \
            --watch-once \
            --diagram-dir build/lisp-core/watch-diagrams \
            --ast-json build/lisp-core/watch-typed-ast.json
          test -s build/lisp-core/typed-ast.json
          test -s build/lisp-core/watch-diagrams/execution.mmd
          grep -q '"analysis": "structural"' build/lisp-core/typed-ast.json

      - name: Verify architecture and slash-pipe lambdas
        run: |
          python3 glyphc.py examples/door_sketch.glyph \
            -o build/door-sketch/generated.rs \
            --host-output build/door-sketch/host.generated.rs \
            --diagram-dir build/door-sketch/diagrams \
            --ast-json build/door-sketch/typed-ast.json
          rustc --edition 2021 --crate-type lib build/door-sketch/generated.rs \
            -o build/door-sketch/libglyph_door_sketch.rlib
          test -s build/door-sketch/diagrams/architecture.mmd
          test -s build/door-sketch/diagrams/architecture-ir.json
          grep -q 'sensor' build/door-sketch/diagrams/architecture.mmd
          grep -q '__glyph_lambda' build/door-sketch/generated.rs

      - name: Verify guarded conditionals and Rust TODO contracts
        run: |
          mkdir -p build/algorithm-sketch
          python3 - <<'PY'
          from pathlib import Path
          from glyph import compile_artifacts, parse_compilation_model

          source = Path('examples/algorithm_sketch.glyph').read_text(encoding='utf-8')
          artifacts = compile_artifacts(source)
          root = Path('build/algorithm-sketch')
          (root / 'generated.rs').write_text(artifacts.logic, encoding='utf-8')
          (root / 'manual.rs').write_text(artifacts.manual_scaffold, encoding='utf-8')
          (root / 'lib.rs').write_text(
              'pub mod generated;\npub mod manual;\n', encoding='utf-8'
          )
          model = parse_compilation_model(source)
          (root / 'rust-todos.txt').write_text(
              '\n'.join(item.name for item in model.opaques) + '\n',
              encoding='utf-8',
          )
          PY
          rustc --edition 2021 --crate-type lib build/algorithm-sketch/lib.rs \
            -o build/algorithm-sketch/libglyph_algorithm_sketch.rlib
          grep -q 'else if x == 0' build/algorithm-sketch/generated.rs
          grep -q 'crate::manual::shortest_path' build/algorithm-sketch/generated.rs
          grep -q 'todo!' build/algorithm-sketch/manual.rs
          grep -q 'shortest_path' build/algorithm-sketch/rust-todos.txt

      - name: Upload generated sources and diagrams
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-artifacts
          path: |
            demo/src/generated.rs
            demo/src/host.generated.rs
            demo-system/src/generated.rs
            demo-system/src/host.generated.rs
            build/acceptance
            build/glyph-diagrams
            build/lisp-core
            build/door-sketch
            build/algorithm-sketch

      - name: Format generated Rust
        run: |
          cargo fmt --manifest-path demo/Cargo.toml
          cargo fmt --manifest-path demo-system/Cargo.toml

      - name: Run Rust tests
        id: rust_tests
        shell: bash
        run: |
          set +e
          cargo test --manifest-path demo/Cargo.toml --verbose > cargo-test.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            cargo test --manifest-path demo-system/Cargo.toml --verbose >> cargo-test.log 2>&1
            status=$?
          fi
          tail -n 160 cargo-test.log
          exit $status

      - name: Upload Cargo test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-log
          path: cargo-test.log

      - name: Run demos
        run: |
          cargo run --manifest-path demo/Cargo.toml --quiet
          cargo run --manifest-path demo-system/Cargo.toml --quiet

      - name: Run Clippy
        run: |
          cargo clippy --manifest-path demo/Cargo.toml --all-targets
          cargo clippy --manifest-path demo-system/Cargo.toml --all-targets
